name: Xcepto .NET release pipeline
on:
  push:
permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: run tests
        run: |
          dotnet test \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"
        env:
          RABBITMQ_URL: localhost
          
      - name: upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: Samples/**/TestResults/**/coverage.cobertura.xml
          
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: .NET Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx
          
  release:
    runs-on: ubuntu-latest
    needs: [ tests ]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g semantic-release @semantic-release/git @semantic-release/github @semantic-release/exec conventional-changelog-conventionalcommits

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}